name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @c14/api db:generate

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 7

      - name: Cache turbo
        uses: actions/cache/save@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @c14/api db:generate

      - name: Test
        run: pnpm test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: apps/api/test-results/
          retention-days: 7

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, lint, test, audit]
    if: always()
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: C14 Library CI <${{ secrets.MAIL_USERNAME }}>
          subject: >
            [${{ needs.build.result == 'success' && needs.lint.result == 'success' && needs.test.result == 'success' && needs.audit.result == 'success' && 'SUCCESS' || 'FAILURE' }}]
            CI ${{ github.repository }} — ${{ github.ref_name }} #${{ github.run_number }}
          body: |
            Pipeline: ${{ github.workflow }}
            Branch:   ${{ github.ref_name }}
            Commit:   ${{ github.sha }}
            Author:   ${{ github.actor }}
            Run:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Jobs:
              Build:  ${{ needs.build.result }}
              Lint:   ${{ needs.lint.result }}
              Test:   ${{ needs.test.result }}
              Audit:  ${{ needs.audit.result }}
