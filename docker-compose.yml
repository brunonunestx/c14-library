services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: c14-library-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://c14:c14pass@postgres:5432/c14_library
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: c14-library-nginx
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: c14-library-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: c14
      POSTGRES_PASSWORD: c14pass
      POSTGRES_DB: c14_library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c14 -d c14_library"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
